# Config nginx pour le sous-domaine tirage.e-services-kouba.com
# À placer dans /etc/nginx/sites-available/tirage puis activer avec un lien
# symbolique vers /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name tirage.e-services-kouba.com;

    # Tout est servi par l'app Flask (frontend + API) via gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Après avoir lancé certbot (HTTPS), ce fichier sera automatiquement
# complété avec le bloc 'listen 443 ssl' et la redirection http -> https.
